<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoLeaf - Email Confirmation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #F5F5F0 0%, #E8E8E0 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 1rem;
        }
        h1 {
            color: #4A9B6F;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .button {
            display: inline-block;
            background: #4A9B6F;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .button:hover {
            background: #357A54;
        }
        .loading {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Email Confirmed!</h1>
        <p id="message">Your account has been verified.</p>
        <p class="loading" id="redirect-message">Attempting to open LingoLeaf app...</p>
        <a href="lingoleaf://" class="button" id="open-app">Open LingoLeaf</a>
    </div>

    <script>
        // Try to open the app automatically
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = urlParams.get('access_token');
        
        if (accessToken) {
            // Build deep link with auth params
            const deepLink = 'lingoleaf://auth' + window.location.hash;
            
            // Try to open the app
            window.location.href = deepLink;
            
            // Update button to include auth params
            document.getElementById('open-app').href = deepLink;
            
            // Fallback message after 3 seconds
            setTimeout(() => {
                document.getElementById('redirect-message').textContent = 
                    'If the app didn\'t open, tap the button below:';
            }, 3000);
        } else {
            document.getElementById('redirect-message').textContent = 
                'Open the LingoLeaf app to continue:';
        }
    </script>
</body>
</html>
